name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Use the build-setup action to test dependency installation
      - name: Install dependencies
        uses: ./.github/actions/build-setup
        with:
          # No actual config is required, since this job just checks that all dependencies can be installed
          CONFIG: "{}"

  lint:
    uses: opalmedapps/actions/.github/workflows/prek.yaml@24350eccf4a071b5ebd14a6dd2b5642a5fb1716d # main
    with:
      skip: reuse-lint-file

  run-reuse-workflow:
    uses: opalmedapps/.github/.github/workflows/reuse.yaml@eb87c1f2f2d17a6e389ada0b2c79aa2e6affcce1 # main
